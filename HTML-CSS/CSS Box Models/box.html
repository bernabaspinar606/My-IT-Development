<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>

    <style>
        .content {
            width: 200px;
            border: 5px solid rgb(92, 193, 164);
            padding: 10px;
            box-sizing: content-box;
            background-color: rgb(132, 91, 208);
        }

        .border {
            width: 200px;
            border: 5px solid rgb(248, 75, 187);
            padding: 10px;
            box-sizing: border-box;
            background-color: rgb(61, 107, 198);
        }
    </style>

</head>
<body>
    <h1>Box Sizing</h1>

<div class="content">content-box</div>
<div class="border">border-box</div>

</body>
</html>
