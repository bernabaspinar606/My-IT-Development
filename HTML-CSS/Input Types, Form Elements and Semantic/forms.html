<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>FORMS</h1>

    <form action="">
        <section id="name">
            <label for="isim">İsim</label> <br>
            <input type="text" id="isim" placeholder="Adinizi giriniz"
            name="isim">

            <br><br>
            <label for="email">Email</label> <br>
            <input type="email"
            id="email"
            name="email"
            placeholder="Email.giriniz"
            required>

            <br><br>
            <label for="pass">Password</label><br>
            <input type="password"
            id="pass"
            name="pass"
            placeholder="En az 8 karakter giriniz"
            required>
            <br><br>
            <label for="age">Age</label>
            <input type="number"
            id="age"
            name="age"
            min="0"
            max="160"
            placeholder="Yasinizi giriniz">
            <br><br>

            <label for="gender">Gender</label> <br>
            <label for="erkek">Erkek</label>
            <input type="radio" id="erkek" name="gender" value="Erkek"> 

            <label for="kadin">Kadin</label>
            <input type="radio" id="kadin" name="gender" value="Kadin"> <br>

            <br>
            <label for="dob">Dogum Tarihi</label>
            <input type="date" name="dob" id="dob" min="1990-01-01">

            <br><br>
            <input type="submit" value="kaydet">
            <input type="reset" value="Sil">
        </section>
    </form>
</body>
</html>
